name: Deploy Angular Demo to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manually triggering the workflow from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions needed to push to gh-pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            examples/angular-demo/package-lock.json

      # ── 3. Build the ValeFlow library ───────────────────────────
      # The Angular demo's package.json references the local ValeFlow
      # package via file:../.. so dist/ must exist before npm install runs there.
      - name: Install root dependencies
        run: npm ci

      - name: Build ValeFlow library
        run: npm run build

      # ── 4. Install Angular demo dependencies ────────────────────
      - name: Install Angular demo dependencies
        working-directory: examples/angular-demo
        run: npm ci

      # ── 5. Build for production ─────────────────────────────────
      # baseHref "/valeflow/" is already set in angular.json
      # production configuration.
      - name: Build Angular demo (production)
        working-directory: examples/angular-demo
        run: npm run build:gh

      # ── 6. Deploy to gh-pages branch ────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: examples/angular-demo/dist/valeflow-demo/browser
          # Optional: use a custom commit message
          commit_message: 'deploy: ${{ github.sha }}'
